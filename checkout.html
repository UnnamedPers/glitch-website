<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Products] - Glitch</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/text.css">
    <link rel="stylesheet" href="css/checkout.css">
    <script src="js/hover-animations.js" defer></script>
    <script src="js/cart-logic.js" defer></script>
</head>
<body>
    <nav class="nav-desktop">
        <a href="products.html" class="nav-explore">
            <p class="text-black">EXPLORE</p>
            <div class="explore-new glitch-button btn-pink-bg">
                <div class="hover-animation"></div>
                <p class="text-white">NEW!</p>
            </div>
        </a>
        <a href="index.html" class="nav-logo">
            <img src="images/logo.png" alt="">
        </a>
        <div class="nav-buttons">
            <a href="#" class="cart-button glitch-button btn-transparent desktop-cart">
                <div class="hover-animation">
                    <!-- <div class="hover-skew"></div> -->
                </div>
                <p class="text-black">CART</p>
                <img src="images/cart.png" alt="">
            </a>
            <div class="mode-button glitch-button btn-transparent">
                <img src="images/sun.png" alt="">
            </div>
        </div>
    </nav>

    <nav class="nav-mobile">
        <a href="index.html" class="nav-logo">
            <img src="images/logo.png" alt="">
        </a>
        <div class="nav-mobile-container">
            <a href="products.html" class="nav-explore">
                <p class="text-black">EXPLORE</p>
                <div class="explore-new glitch-button btn-pink-bg">
                    <div class="hover-animation"></div>
                    <p class="text-white">NEW!</p>
                </div>
            </a>
            <div class="nav-buttons">
                <a href="#" class="cart-button glitch-button btn-transparent mobile-cart">
                    <div class="hover-animation">
                        <!-- <div class="hover-skew"></div> -->
                    </div>
                    <p class="text-black">CART</p>
                    <img src="images/cart.png" alt="">
                </a>
                <div class="mode-button glitch-button btn-transparent">
                    <img src="images/sun.png" alt="">
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="cart-list">
            <!-- Cart items will be injected here automatically -->
        </div>
        <p class="total-text text-black">Total: $0.00</p>
        <div class="checkout-form">
            
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <img class="logo" src="images/logo-white.png" alt="">
                <div class="footer-links">
                    <p class="text-white">PRODUCTS</p>
                    <p class="text-white">ABOUT</p>
                    <p class="text-white">PRIVACY POLICY</p>
                    <p class="text-white">TERMS OF SERVICE</p>
                </div>
                <div class="footer-designer">
                    <p class="text-white">DESIGNED BY:</p>
                    <img src="images/qr-code.svg" alt="">
                </div>
            </div>
            <div class="footer-right">
                <div class="footer-socials">
                    <p class="text-white">FIND US ON:</p>
                    <div class="social-icons">

                    </div>
                </div>
                <div class="footer-newsletters">
                    <p class="text-white">SUBSCRIBE TO OUR NEWSLETTER!</p>
                    <input class="newsletter-input" type="email" placeholder="ENTER YOUR EMAIL...">
                </div>
            </div>
        </div>

        <p class="text-white">Copyright © 2026 Glitch. All rights reserved.</p>
    </footer>
</body>
</html>
